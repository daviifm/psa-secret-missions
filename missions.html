<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission</title>
    <link rel="stylesheet" href="css/missions.css">
</head>
<body>
    <div id="game-container"></div>
    <script>
        const params = new URLSearchParams(window.location.search)
        const folder = params.get("folder")
        const quest = params.get("quest")
    </script>

    <script>
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register(`./sw.js?folder=${encodeURIComponent(folder)}&quest=${quest}`)
                .then(registration => {
                    if(registration.active) {
                        loadGame()
                    } else {
                        navigator.serviceWorker.addEventListener('controllerchange', () => {
                            loadGame()
                        })
                    }
                })
                .catch(error => console.log('Erro:', error))
        }

        function loadGame() {
            const ruffleScript = document.createElement('script')
            ruffleScript.src = 'ruffle/ruffle.js'
            document.body.appendChild(ruffleScript)
            ruffleScript.onload = () => {
                const embed = document.createElement('embed')
                embed.setAttribute('src', `swf/${folder}/quest/${quest}/quest.swf`)
                embed.setAttribute('width', '910')
                embed.setAttribute('height', '575')
                const object = document.createElement('object')
                object.appendChild(embed)
                document.getElementById('game-container').appendChild(object)
            }
        }
    </script>
</body>
</html>
