<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission</title>
    <link rel="stylesheet" href="css/missions.css">
</head>
<body>
    <div id="game-container"></div>
    <script>
        const params = new URLSearchParams(window.location.search)
        const folder = params.get("folder")
        const quest = params.get("quest")
    </script>

    <script>
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register(`./sw.js?folder=${encodeURIComponent(folder)}&quest=${quest}`)
                .then(registration => {
                    const sw = registration.active || registration.installing || registration.waiting
                    const activate = (worker) => {
                        worker.addEventListener('statechange', function() {
                            if(this.state === 'activated') {
                                loadGame()
                            }
                        })
                    }
                    if(registration.active) {
                        loadGame()
                    } 
                    else {
                        activate(sw)
                    }
                })
        }       

        function loadGame() {
            const embed = document.createElement('embed')
            embed.setAttribute('src', `swf/${folder}/quest/${quest}/quest.swf`)
            embed.setAttribute('width', '910')
            embed.setAttribute('height', '575')
            const object = document.createElement('object')
            object.appendChild(embed)
            document.getElementById('game-container').appendChild(object)
        }
    </script>


    <script src="ruffle/ruffle.js"></script>
</body>
</html>
